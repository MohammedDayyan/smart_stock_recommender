<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions — Stockify</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .tx-table { width:100%;border-collapse:collapse;font-size:13px; }
    .tx-table th { text-align:left;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);padding:10px 16px;border-bottom:1px solid var(--border); }
    .tx-table td { padding:13px 16px;border-bottom:1px solid rgba(99,140,220,0.06);color:var(--text-main); }
    .tx-table tr:hover td { background:var(--bg-hover); }
    .tx-table .price { font-family:var(--mono); }
    .tx-badge { display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:5px; }
    .tx-badge.buy  { background:rgba(45,212,138,0.12);color:var(--accent-green);border:1px solid rgba(45,212,138,0.25); }
    .tx-badge.sell { background:rgba(242,83,106,0.12);color:var(--accent-red);  border:1px solid rgba(242,83,106,0.25); }
  </style>
</head>
<body>

  <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><h1>Stockify</h1><span>Smart Stock Recommender</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="portfolio.html"><span class="nav-icon">💼</span> Portfolio</a>
      <a href="watchlist.html"><span class="nav-icon">👁️</span> Watchlist</a>
      <a href="history.html" class="active"><span class="nav-icon">🧾</span> Transactions</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">S</div>
        <div><div class="user-name" id="displayUsername">Investor</div><div class="user-role">Investor</div></div>
      </div>
      <button class="btn-logout" onclick="logout()">⏻ Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div><h1>Transactions</h1><p class="greeting">Your full trade history.</p></div>
    </div>

    <div class="dash-card" style="overflow-x:auto;">
      <table class="tx-table" id="txTable">
        <thead>
          <tr>
            <th>Date &amp; Time</th><th>Symbol</th><th>Type</th>
            <th>Qty</th><th>Price</th><th>Total</th>
          </tr>
        </thead>
        <tbody id="txBody">
          <tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:40px;">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="js/auth.js"></script>
  <script>
    const API = "http://localhost:3000";
    if (!localStorage.getItem("token")) { alert("Please login first"); window.location.href="login.html"; }
    const u = localStorage.getItem("username")||"Investor";
    document.getElementById("displayUsername").textContent = u;
    document.getElementById("userAvatar").textContent = u[0].toUpperCase();

    async function loadHistory() {
      const token = localStorage.getItem("token");
      try {
        const res  = await fetch(`${API}/transactions`,{headers:{"Authorization":token}});
        const data = await res.json();
        const tbody = document.getElementById("txBody");
        if (!data.length) { tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:48px;">No transactions yet.</td></tr>`; return; }
        tbody.innerHTML = data.map(tx=>`
          <tr>
            <td style="color:var(--text-muted);font-size:12px;">${new Date(tx.time).toLocaleString("en-IN")}</td>
            <td style="font-weight:700;letter-spacing:0.04em;">${tx.symbol}</td>
            <td><span class="tx-badge ${tx.type.toLowerCase()}">${tx.type}</span></td>
            <td class="price">${tx.quantity}</td>
            <td class="price">₹${tx.price.toLocaleString("en-IN",{minimumFractionDigits:2})}</td>
            <td class="price" style="color:${tx.type==="BUY"?"var(--accent-red)":"var(--accent-green)"};">
              ${tx.type==="BUY"?"−":"+"}₹${tx.total.toLocaleString("en-IN",{minimumFractionDigits:2})}
            </td>
          </tr>`).join("");
      } catch(err) {
        document.getElementById("txBody").innerHTML=`<tr><td colspan="6" style="text-align:center;color:var(--accent-red);">Failed to load.</td></tr>`;
      }
    }
    loadHistory();
  </script>
</body>
</html>
